asyncapi: '2.6.0'
info:
  title: Pets & Orders API
  version: '1.0.0'
  description: HTTP-style API described using AsyncAPI (no eventing)

servers:
  local:
    url: http://localhost:8080
    protocol: http
    description: Local server

channels:
  /pets:
    description: Pets collection
    subscribe:
      operationId: listPets
      summary: List all pets
      message:
        name: ListPetsResponse
        payload:
          type: array
          items:
            $ref: '#/components/schemas/Pet'
    publish:
      operationId: createPet
      summary: Create a pet
      message:
        name: CreatePetRequest
        payload:
          $ref: '#/components/schemas/NewPet'

  /pets/{petId}:
    parameters:
      petId:
        description: ID of the pet
        schema:
          type: integer
          format: int64
    subscribe:
      operationId: getPetById
      summary: Get pet by ID
      message:
        name: GetPetResponse
        payload:
          $ref: '#/components/schemas/Pet'

  /orders:
    description: Orders collection
    subscribe:
      operationId: listOrders
      summary: List all orders
      message:
        name: ListOrdersResponse
        payload:
          type: array
          items:
            $ref: '#/components/schemas/Order'
    publish:
      operationId: createOrder
      summary: Create an order
      message:
        name: CreateOrderRequest
        payload:
          $ref: '#/components/schemas/NewOrder'

components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string

    NewPet:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tag:
          type: string

    Order:
      type: object
      required: [id, petId, quantity, status]
      properties:
        id:
          type: integer
          format: int64
        petId:
          type: integer
          format: int64
        quantity:
          type: integer
        status:
          type: string
          enum: [PLACED, APPROVED, DELIVERED]

    NewOrder:
      type: object
      required: [petId, quantity]
      properties:
        petId:
          type: integer
          format: int64
        quantity:
          type: integer
