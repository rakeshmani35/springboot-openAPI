spring:
  application:
    name: pets-orders-asyncapi
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:petsdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

server:
  port: 8080

